version: 2.1
jobs:
  build-android:
    docker:
      - image: kivy/buildozer:latest
    steps:
      - checkout
      - run:
          name: Build APK
          command: |
            if [ ! -f buildozer.spec ]; then
              buildozer init
              sed -i 's/requirements = python3, kivy/requirements = python3, kivy, psutil/' buildozer.spec
              sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
            fi
            BUILDOZER_WARN_ON_ROOT=0 buildozer android debug
workflows:
  build:
    jobs:
      - build-android
      
