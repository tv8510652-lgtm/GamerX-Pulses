version: 2.1
jobs:
  build-android:
    docker:
      - image: ghcr.io/kivy/buildozer:master
    steps:
      - checkout
      - run:
          name: Build APK directly
          command: |
            # إنشاء ملف الإعدادات إذا لم يكن موجوداً
            if [ ! -f buildozer.spec ]; then
              buildozer init
              sed -i 's/requirements = python3, kivy/requirements = python3, kivy, psutil/' buildozer.spec
              sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
            fi
            # البدء بالتجميع مباشرة باستخدام البيئة الرسمية الجاهزة
            buildozer android debug
      - store_artifacts:
          path: bin/
          destination: apk-files
workflows:
  build:
    jobs:
      - build-android
      
